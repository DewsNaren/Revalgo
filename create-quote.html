<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Revalgo | Create Quote</title> 
        <link rel="stylesheet" href="./assets/vendor/bootstrap/css/bootstrap.min.css">
        <!-- <link rel="stylesheet" href="./assets/vendor/fontawesome/css/all.min.css"> -->
        <link rel="stylesheet" href="./assets/css/style.css">
    </head>
    <body>
        <header>
            <a href="./login.html" class="logo"><img src="./assets/images/login/Revalgo White Background.png" alt="Revalgo White"></a>
            <div class="search-wrapper">
                <input type="text" id="search-quote" class="search-quote" name="search-quote" placeholder="PO#, Order#, Customer# / Name">
                <label for="search-quote" ><img src="./assets/images/dashboard/Search icon.png" alt="Search icon"></label>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="new-quote-btn">New Quote</a></li>
                    <li><a href="#"><img src="./assets/images/global/home.png" alt="home"></a></li>
                    <li><a href="#"><img src="./assets/images/global/bell.png" alt="bell"></a></li>
                    <li><a href="#"><img src="./assets/images/global/settings.png" alt="settings"></a></li>
                    <li class="profile-container">
                        <div class="profile-img-wrapper">
                            <img src="./assets/images/global/user.png" class="user-profile" alt="profile"/>
                        </div>
                                
                        <button type="button" class="profile-toggle">
                        <img
                            src="./assets/images/global/down-arrow.png"
                            class="down-arrow"
                            alt="down-arrow"
                        />
                        </button>
                            <div class="profile-menu">
                            <a href="#" class="login-btn">LogIn</a>
                            <a href="#" class="logout-btn">Logout</a>
                        </div>
                    </li>
                </ul>

            </nav>
        </header>
        <main class="create-quote-wrapper">
            <div class="create-quote-container">
                <button type="button" class="back-create-btn"><img src="./assets/images/global/arrow-left-blue-1.png" alt="left arrow">Create Quote</button>
            </div>  
            <div class="create-input-wrapper">
                <div class="btn-container">
                    <button type="button" class="new-btn"><img src="./assets/images/create_quote/png/create quote_new icon_Black.png" class="img-grey" alt="Create Quote">
                        <img src="./assets/images/create_quote/png/create quote_new icon_Blue.png" class="img-blue" alt="Create Quote"> New
                    </button>
                     <button type="button" class="exist-btn"><img src="./assets/images/create_quote/png/create quote_existing icon_Grey.png" class="img-grey" alt="Create Quote">
                        <img src="./assets/images/create_quote/png/create quote_Existing icon_Blue.png" class="img-blue" alt="Create Quote"> From Existing
                    </button>
                </div>
            </div>
        </main>
    </body>
</html>
