<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Revalgo | Login</title>
        <link rel="stylesheet" href="./assets/css/style.css">
        <link rel="stylesheet" href="./assets/vendor/fontawesome/css/all.min.css">
    </head>
    
    <body>
        
        <main class="login-wrapper">
            <section class="login-inner-wrapper">
                <div class="login-container">
                    <img src="./assets/images/login/Revalgo White Background.png" class="logo" alt="Revalgo White" />
                    <h2 class="login-header">Welcome Back!</h2>
                    <form class="login-form">
                        <div class="input-wrapper">
                            <div class="form-group">
                                <label for="username"><i class="fa-regular fa-user"></i></label>
                                <input  type="text" name="username" class="username" id="username" placeholder="Username" autocomplete="on"/>
                            </div>
                            <p class="error"></p>
                        </div>
                        <div class="input-wrapper password-wrapper">
                            <div class="form-group">
                                <label for="password"><i class="fa-solid fa-lock"></i></label>
                                <input  type="password" name="password" class="password" id="password" placeholder="Password"/>
                            </div>
                            <p class="error"></p>
                        </div>
                        <div class="forgot-wrapper">
                            <div class="remember-wrapper">
                                <input type="checkbox" name="remember" id="remember">
                                <label for="remember">Remember me</label>
                            </div>
                            <div class="forgot-container">
                                <a href="#" id="forgot-password" class="forgot-link">Forgot Password?</a>
                            </div>
                        </div>
                        <div class="submit-btn-container">
                            <button type="submit" class="login-btn">Log In</button>
                            <p class="or-text">or</p>
                             <a href="#" id="login-acnt" class="login-acnt">Login with Microsoft Account</a>
                        </div>
                       
                        
                    </form> 
            

                </div>
                <img src="./assets/images/login/Bg patterns.png" class="bg-pattern bg-img" alt="Bg patterns">
                
                <img src="./assets/images/login/yellow circle_bg.png" class="top-left-bg bg-img" alt="yellow circle_bg">
                <img src="./assets/images/login/right top corner pattern_bg.png" class="top-right-bg bg-img" alt="right top corner pattern">
                <img src="./assets/images/login/left bottom corner pattern_bg.png" class="bottom-left-bg bg-img" alt="left bottom corner pattern">
                <img src="./assets/images/login/orange circle pattern_bg.png" class="bottom-right-bg bg-img" alt="orange circle pattern">
                <p class="copyright-text">&copy; 2026 Revalgo. All rights reserved</p>
            </section>
        </main>
        <script src="./assets/js/login.js"></script>
    </body>
</html>
